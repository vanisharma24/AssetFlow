# Full-stack AssetFlow deployment: Postgres + backend + frontend.
#   docker compose -f docker-compose.prod.yml up --build -d
# Then seed demo data once:
#   docker compose -f docker-compose.prod.yml exec backend npx tsx src/seed.ts
services:
  postgres:
    image: postgres:16-alpine
    container_name: assetflow-db-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: assetflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: assetflow-backend
    environment:
      DATABASE_URL: "postgresql://postgres:password123@postgres:5432/assetflow?schema=public"
      PORT: "5000"
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:5000"
    container_name: assetflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
